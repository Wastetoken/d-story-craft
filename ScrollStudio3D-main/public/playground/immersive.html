    <!-- Frame Scrubber JavaScript -->
    <script>
        /**
         * High-Performance Frame Scrubber
         * Modified to reveal main content around frame 18–20 and then hand off scroll.
         */
        class FrameScrubber {
            constructor(containerSelector, config = {}) {
                this.container = document.querySelector(containerSelector);
                if (!this.container) {
                    throw new Error(`Container not found: ${containerSelector}`);
                }

                this.canvas = this.container.querySelector('canvas');
                if (!this.canvas) {
                    throw new Error('Canvas element not found in container');
                }

                this.ctx = this.canvas.getContext('2d', { alpha: true });

                // Configuration
                this.totalFrames = config.totalFrames || 83;
                this.baseUrl = config.baseUrl || 'https://pub-bba39d5cdeb3412ea069e9699b3bf3d8.r2.dev';
                this.filenamePattern = config.filenamePattern || 'FramesHomePNG';
                this.scrollSensitivity = config.scrollSensitivity || 0.002;
                this.smoothingFactor = config.smoothingFactor || 0.9;
                this.decayFactor = config.decayFactor || 0.95;
                this.backgroundImage = config.backgroundImage || null;
                this.backgroundStartFrame = config.backgroundStartFrame || 0;
                this.backgroundEndFrame = config.backgroundEndFrame || this.totalFrames;

                // NEW: reveal threshold + flag
                this.revealFrame = config.revealFrame || 18; // frame where HTML starts to appear
                this.hasRevealedMain = false;

                // State
                this.images = [];
                this.loadedImages = new Set();
                this.backgroundImg = null;
                this.backgroundLoaded = false;
                this.virtualFrame = 0;
                this.targetDelta = 0;
                this.smoothedDelta = 0;
                this.isAnimating = false;
                this.loadingProgress = 0;

                // Bind methods
                this.handleWheel = this.handleWheel.bind(this);
                this.handleResize = this.handleResize.bind(this);
                this.animate = this.animate.bind(this);

                this.init();
            }

            async init() {
                this.showLoadingState();
                await this.preloadImages();
                if (this.backgroundImage) {
                    await this.loadBackgroundImage();
                }
                this.setupEventListeners();
                this.drawFrame(0);
                this.startAnimation();
            }

            async loadBackgroundImage() {
                return new Promise((resolve) => {
                    this.backgroundImg = new Image();
                    this.backgroundImg.onload = () => {
                        this.backgroundLoaded = true;
                        console.log('Background image loaded');
                        resolve();
                    };
                    this.backgroundImg.onerror = () => {
                        console.error('Failed to load background image');
                        resolve();
                    };
                    this.backgroundImg.src = this.backgroundImage;
                });
            }

            async preloadImages() {
                const loadPromises = [];

                for (let i = 0; i < this.totalFrames; i++) {
                    const img = new Image();
                    const frameNum = String(i).padStart(2, '0');
                    const url = `${this.baseUrl}/${this.filenamePattern}${frameNum}.png`;

                    this.images[i] = img;
                    const loadPromise = new Promise((resolve) => {
                        const timeout = setTimeout(() => {
                            console.error(`Timeout loading frame ${frameNum}`);
                            this.images[i] = this.createPlaceholder(frameNum);
                            this.loadedImages.add(i);
                            this.loadingProgress = (this.loadedImages.size / this.totalFrames) * 100;
                            this.updateLoadingProgress();
                            resolve();
                        }, 10000);

                        img.onload = () => {
                            clearTimeout(timeout);
                            this.loadedImages.add(i);
                            this.loadingProgress = (this.loadedImages.size / this.totalFrames) * 100;
                            this.updateLoadingProgress();
                            resolve();
                        };

                        img.onerror = (e) => {
                            clearTimeout(timeout);
                            console.error(`Failed to load frame ${frameNum}:`, e);
                            this.images[i] = this.createPlaceholder(frameNum);
                            this.loadedImages.add(i);
                            this.loadingProgress = (this.loadedImages.size / this.totalFrames) * 100;
                            this.updateLoadingProgress();
                            resolve();
                        };

                        img.src = url;
                    });

                    loadPromises.push(loadPromise);
                }

                try {
                    await Promise.all(loadPromises);
                    console.log(`All frames processed: ${this.loadedImages.size} loaded`);
                    this.hideLoadingState();
                } catch (error) {
                    console.error('Error preloading images:', error);
                }
            }

            createPlaceholder(frameNum = '???') {
                const placeholder = document.createElement('canvas');
                placeholder.width = 1920;
                placeholder.height = 1080;
                const ctx = placeholder.getContext('2d');

                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, placeholder.width, placeholder.height);

                ctx.fillStyle = '#666';
                ctx.font = '48px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`Frame ${frameNum} Error`, placeholder.width / 2, placeholder.height / 2);

                return placeholder;
            }

            showLoadingState() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;

                this.ctx.fillStyle = '#0a0a0a';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.ctx.fillStyle = '#ffffff';
                this.ctx.font = '20px system-ui, -apple-system, sans-serif';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText('Loading frames...', this.canvas.width / 2, this.canvas.height / 2);
            }

            updateLoadingProgress() {
                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;

                this.ctx.fillStyle = '#0a0a0a';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                const barWidth = Math.min(400, this.canvas.width * 0.6);
                const barHeight = 4;
                const barX = (this.canvas.width - barWidth) / 2;
                const barY = this.canvas.height / 2 + 30;

                this.ctx.fillStyle = '#333';
                this.ctx.fillRect(barX, barY, barWidth, barHeight);

                this.ctx.fillStyle = '#4a9eff';
                this.ctx.fillRect(barX, barY, barWidth * (this.loadingProgress / 100), barHeight);

                this.ctx.fillStyle = '#ffffff';
                this.ctx.font = '20px system-ui, -apple-system, sans-serif';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText(
                    `Loading frames... ${Math.round(this.loadingProgress)}%`,
                    this.canvas.width / 2,
                    this.canvas.height / 2 - 10
                );
            }

            hideLoadingState() {
                // first frame replaces loading state
            }

            setupEventListeners() {
                window.addEventListener('wheel', this.handleWheel, { passive: false });
                window.addEventListener('resize', this.handleResize);
            }

            handleWheel(e) {
                // If we've already revealed the main content, let scroll behave normally
                if (this.hasRevealedMain) return;

                e.preventDefault();

                const nextFrame = this.virtualFrame + (e.deltaY * this.scrollSensitivity);

                if (nextFrame < 0) {
                    this.virtualFrame = 0;
                    this.targetDelta = 0;
                    this.smoothedDelta = 0;
                    return;
                }

                if (nextFrame >= this.totalFrames - 1) {
                    this.virtualFrame = this.totalFrames - 1;
                    this.targetDelta = 0;
                    this.smoothedDelta = 0;
                    return;
                }

                this.targetDelta += e.deltaY * this.scrollSensitivity;
            }

            handleResize() {
                this.drawFrame(Math.floor(this.virtualFrame));
            }

            drawFrame(index) {
                const frameIndex = Math.max(0, Math.min(index, this.totalFrames - 1));
                const img = this.images[frameIndex];

                if (!img || !this.loadedImages.has(frameIndex)) {
                    return;
                }

                const rect = this.container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                if (
                    this.backgroundLoaded &&
                    frameIndex >= this.backgroundStartFrame &&
                    frameIndex <= this.backgroundEndFrame
                ) {
                    this.drawBackground();
                }

                const imgWidth = img.width || img.naturalWidth;
                const imgHeight = img.height || img.naturalHeight;
                if (!imgWidth || !imgHeight) return;

                const imgAspect = imgWidth / imgHeight;
                const canvasAspect = this.canvas.width / this.canvas.height;

                let drawWidth, drawHeight, offsetX, offsetY;

                if (imgAspect > canvasAspect) {
                    drawHeight = this.canvas.height;
                    drawWidth = this.canvas.height * imgAspect;
                    offsetX = (this.canvas.width - drawWidth) / 2;
                    offsetY = 0;
                } else {
                    drawWidth = this.canvas.width;
                    drawHeight = this.canvas.width / imgAspect;
                    offsetX = 0;
                    offsetY = (this.canvas.height - drawHeight) / 2;
                }

                try {
                    this.ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
                } catch (error) {
                    console.error(`Error drawing frame ${frameIndex}:`, error);
                }
            }

            drawBackground() {
                if (!this.backgroundImg) return;

                const bgWidth = this.backgroundImg.width;
                const bgHeight = this.backgroundImg.height;
                const bgAspect = bgWidth / bgHeight;
                const canvasAspect = this.canvas.width / this.canvas.height;

                let drawWidth, drawHeight, offsetX, offsetY;

                if (bgAspect > canvasAspect) {
                    drawHeight = this.canvas.height;
                    drawWidth = this.canvas.height * bgAspect;
                    offsetX = (this.canvas.width - drawWidth) / 2;
                    offsetY = 0;
                } else {
                    drawWidth = this.canvas.width;
                    drawHeight = this.canvas.width / bgAspect;
                    offsetX = 0;
                    offsetY = (this.canvas.height - drawHeight) / 2;
                }

                try {
                    this.ctx.drawImage(this.backgroundImg, offsetX, offsetY, drawWidth, drawHeight);
                } catch (error) {
                    console.error('Error drawing background:', error);
                }
            }

            animate() {
                if (!this.isAnimating) return;

                this.smoothedDelta += (this.targetDelta - this.smoothedDelta) * this.smoothingFactor;
                this.virtualFrame += this.smoothedDelta;

                if (this.virtualFrame < 0) {
                    this.virtualFrame = 0;
                    this.targetDelta = 0;
                    this.smoothedDelta = 0;
                }

                if (this.virtualFrame >= this.totalFrames - 1) {
                    this.virtualFrame = this.totalFrames - 1;
                    this.targetDelta = 0;
                    this.smoothedDelta = 0;
                }

                // Reveal main content around configured frame
                if (!this.hasRevealedMain && this.virtualFrame >= this.revealFrame) {
                    this.hasRevealedMain = true;

                    const main = document.getElementById('main-content');
                    if (main) {
                        main.classList.add('visible');
                    }

                    // Fade scrub out
                    setTimeout(() => {
                        this.container.classList.add('completed');
                    }, 400);

                    // Stop listening to wheel so normal scroll kicks in
                    window.removeEventListener('wheel', this.handleWheel, { passive: false });

                    // Optionally freeze the scrub at this frame
                    this.virtualFrame = this.revealFrame;
                    this.targetDelta = 0;
                    this.smoothedDelta = 0;
                }

                this.drawFrame(Math.floor(this.virtualFrame));
                this.targetDelta *= this.decayFactor;
                requestAnimationFrame(this.animate);
            }

            startAnimation() {
                if (this.isAnimating) return;
                this.isAnimating = true;
                this.animate();
            }

            stopAnimation() {
                this.isAnimating = false;
            }

            destroy() {
                this.stopAnimation();
                window.removeEventListener('wheel', this.handleWheel);
                window.removeEventListener('resize', this.handleResize);
                this.images = [];
                this.loadedImages.clear();
            }
        }

        // Initialize Frame Scrubber
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const scrubber = new FrameScrubber('.frame-container', {
                    totalFrames: 83,
                    filenamePattern: 'FramesHomePNG',
                    backgroundImage: 'https://pub-6738c828bef548d69b3f13bdd680b5b0.r2.dev/SSIMAGE.PNG',
                    backgroundStartFrame: 18,
                    backgroundEndFrame: 83,
                    scrollSensitivity: 0.02,
                    smoothingFactor: 0.01,
                    decayFactor: 0.95,
                    revealFrame: 82 // <— this is the handoff frame
                });

                window.frameScrubber = scrubber;
            } catch (error) {
                console.error('Failed to initialize frame scrubber:', error);
            }
        });
    </script>

        function CTASection() {
            const sectionRef = React.useRef(null);

            React.useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                const el = sectionRef.current;

                gsap.fromTo(
                    el.querySelectorAll(".cta-anim"),
                    { opacity: 0, y: 80, scale: 0.9 },
                    {
                        opacity: 1,
                        y: 0,
                        scale: 1,
                        duration: 1.2,
                        stagger: 0.2,
                        ease: "power3.out",
                        scrollTrigger: {
                            trigger: el,
                            start: "top 60%",
                            toggleActions: "play none none reverse"
                        }
                    }
                );
            }, []);

            return React.createElement(
                "section",
                { ref: sectionRef, className: "section-h flex-col items-center text-center" },
                React.createElement(
                    "p",
                    { className: "cta-anim text-xs tracking-[0.3em] uppercase text-white/40 mb-4" },
                    "Ready?"
                ),
                React.createElement(
                    "h2",
                    {
                        className:
                            "cta-anim text-[7vw] font-serif italic tracking-[-0.05em] mb-2",
                        style: {
                            fontFamily: "'Playfair Display', serif",
                            WebkitTextStroke: "2px rgba(255, 255, 255, 0.6)",
                            WebkitTextFillColor: "transparent"
                        }
                    },
                    "Begin Your"
                ),
                React.createElement(
                    "h3",
                    {
                        className:
                            "cta-anim text-[7vw] font-serif italic tracking-[-0.05em] text-white/60 mb-10",
                        style: { fontFamily: "'Playfair Display', serif" }
                    },
                    "Journey"
                ),
                React.createElement(
                    "p",
                    {
                        className: "cta-anim text-white/60 text-lg mt-6 max-w-md mb-10"
                    },
                    "Let us bring your vision to life with immersive experiences."
                ),
                React.createElement(
                    "a",
                    {
                        href: "https://scroll-studio3-d.vercel.app",
                        target: "_blank",
                        rel: "noopener noreferrer",
                        className:
                            "cta-anim group relative px-12 py-5 bg-gradient-to-r from-orange-600 to-red-600 text-white font-medium tracking-widest uppercase text-sm rounded-full overflow-hidden transition-all duration-500 hover:scale-105 hover:shadow-[0_0_40px_rgba(255,77,0,0.5)] pointer-events-auto inline-block no-underline"
                    },
                    React.createElement("span", { className: "relative z-10" }, "Start Creating"),
                    React.createElement("div", {
                        className:
                            "absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity duration-300"
                    })
                ),
                React.createElement(
                    "p",
                    { className: "cta-anim text-white/30 text-xs mt-8 tracking-wider" },
                    "↑ Our friend insists"
                )
            );
        }

        function Scene3D({ onProgress, onLoaded }) {
            React.useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(
                    40,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                camera.position.set(0, 2, 18);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1;
                document.getElementById("viewport").appendChild(renderer.domElement);

                const ambient = new THREE.AmbientLight(0xffffff, 0.4);
                const point = new THREE.PointLight(0xff8800, 2, 50);
                point.position.set(5, 5, 5);
                const directional = new THREE.DirectionalLight(0xffffff, 0.8);
                directional.position.set(-5, 10, 7);
                scene.add(ambient, point, directional);

                const composer = new THREE.EffectComposer(renderer);
                composer.addPass(new THREE.RenderPass(scene, camera));
                const bloom = new THREE.UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    0.5,
                    0.04,
                    0.02
                );
                composer.addPass(bloom);

                let model,
                    mixer,
                    animations = {},
                    currentAnim = "";

                const loader = new THREE.GLTFLoader();
                const modelUrl =
                    "https://pub-a56d70d158b1414d83c3856ea210601c.r2.dev/Emotive%20creature.glb";

                loader.load(
                    modelUrl,
                    (gltf) => {
                        model = gltf.scene;
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3()).length();
                        model.scale.setScalar(9 / size);
                        model.position.set(0, -2, 0);
                        scene.add(model);

                        mixer = new THREE.AnimationMixer(model);

                        if (gltf.animations && gltf.animations.length > 0) {
                            gltf.animations.forEach((clip) => {
                                const name = clip.name.toLowerCase().replace(/\s+/g, "_");
                                animations[name] = mixer.clipAction(clip);
                            });

                            const firstAnim = Object.keys(animations)[0];
                            if (firstAnim) playAnimation(firstAnim);
                        }

                        setupScrollAnimation(model);
                        onLoaded();
                    },
                    (xhr) => {
                        if (xhr.total > 0) onProgress(Math.round((xhr.loaded / xhr.total) * 100));
                    },
                    (err) => {
                        console.error("Model load error details:", err.message || err.type || err);
                        onLoaded();
                    }
                );

                function playAnimation(name) {
                    if (currentAnim === name || !animations[name]) return;
                    Object.values(animations).forEach((a) => a.fadeOut(0.5));
                    animations[name].reset().fadeIn(0.5).play();
                    currentAnim = name;
                }

                function setupScrollAnimation(m) {
                    gsap.registerPlugin(ScrollTrigger);
                    const animKeys = Object.keys(animations);

                    ScrollTrigger.create({
                        trigger: "main",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: true,
                        onUpdate: (self) => {
                            if (animKeys.length === 0) return;
                            const idx = Math.floor(self.progress * animKeys.length) % animKeys.length;
                            playAnimation(animKeys[idx] || animKeys[0]);
                        }
                    });

                    const tl = gsap.timeline({
                        scrollTrigger: {
                            trigger: "main",
                            start: "top top",
                            end: "bottom bottom",
                            scrub: 1
                        }
                    });

                    tl.to(m.position, { x: 0, y: -1, z: 6 }, 0)
                        .to(m.rotation, { y: 0, x: 0.1, z: 0 }, 0)
                        .to(m.position, { x: -5, y: -1, z: 4 }, 0.2)
                        .to(m.rotation, { y: Math.PI * 0.3, x: 0, z: 0.05 }, 0.2)
                        .to(m.position, { x: 5, y: -2, z: 3 }, 0.45)
                        .to(m.rotation, { y: -Math.PI * 0.35, x: 0.1, z: -0.05 }, 0.45)
                        .to(m.position, { x: 0, y: 0, z: 5 }, 0.65)
                        .to(m.rotation, { y: Math.PI * 0.1, x: -0.15, z: 0 }, 0.65)
                        .to(m.position, { x: 1.5, y: 1.5, z: 12 }, 0.01)
                        .to(m.rotation, { y: -Math.PI * 0.1, x: 0.3, z: -0.2 }, 0.45);
                }

                const clock = new THREE.Clock();

                function animate() {
                    requestAnimationFrame(animate);
                    if (mixer) mixer.update(clock.getDelta());
                    composer.render();
                }

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    composer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener("resize", handleResize);

                return () => {
                    window.removeEventListener("resize", handleResize);
                    renderer.dispose();
                };
            }, []);

            return null;
        }
    </script>

    <script>
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught:", error, errorInfo.componentStack);
            }
            render() {
                if (this.state.hasError) {
                    return React.createElement(
                        "div",
                        { className: "min-h-screen flex items-center justify-center bg-gray-900" },
                        React.createElement(
                            "div",
                            { className: "text-center text-white" },
                            React.createElement(
                                "h1",
                                { className: "text-2xl font-bold mb-4" },
                                "Something went wrong"
                            ),
                            React.createElement(
                                "button",
                                {
                                    onClick: () => window.location.reload(),
                                    className: "px-6 py-2 bg-white text-black rounded"
                                },
                                "Reload"
                            )
                        )
                    );
                }
                return this.props.children;
            }
        }

        function Loader({ progress }) {
            return React.createElement(
                "div",
                {
                    className:
                        "fixed inset-0 z-[60] flex items-center justify-center bg-black/80 pointer-events-none"
                },
                React.createElement(
                    "div",
                    { className: "text-center text-white" },
                    React.createElement(
                        "p",
                        { className: "text-xs tracking-[0.3em] uppercase mb-3 text-white/60" },
                        "Preparing Scene"
                    ),
                    React.createElement(
                        "div",
                        { className: "w-40 h-[2px] bg-white/10 overflow-hidden mx-auto" },
                        React.createElement("div", {
                            className: "h-full bg-white",
                            style: { width: `${progress || 0}%`, transition: "width 0.2s ease-out" }
                        })
                    ),
                    React.createElement(
                        "p",
                        { className: "text-xs mt-3 text-white/40" },
                        `${progress || 0}%`
                    )
                )
            );
        }

        function App() {
            try {
                const [loading, setLoading] = React.useState(true);
                const [progress, setProgress] = React.useState(0);

                return React.createElement(
                    "div",
                    { "data-name": "app", "data-file": "app.js" },
                    loading && React.createElement(Loader, { progress }),
                    React.createElement(NoiseLayer, null),
                    React.createElement(Navigation, null),
                    React.createElement("div", { id: "viewport" }),
                    React.createElement(Scene3D, {
                        onProgress: setProgress,
                        onLoaded: () => setLoading(false)
                    }),
                    React.createElement(
                        "main",
                        null,
                        React.createElement(HeroSection, null),
                        React.createElement(ContentSection, {
                            title: "Transform",
                            subtitle: "Vision",
                            desc: "Where imagination meets precision.",
                            align: "left",
                            index: 1
                        }),
                        React.createElement(ContentSection, {
                            title: "Command",
                            subtitle: "The Moment",
                            desc: "Every frame tells a story.",
                            align: "right",
                            index: 2
                        }),
                        React.createElement(ContentSection, {
                            title: "Elevate",
                            subtitle: "Beyond",
                            desc: "Pushing boundaries of possibility.",
                            align: "center",
                            index: 3
                        }),
                        React.createElement(CTASection, null)
                    )
                );
            } catch (error) {
                console.error("App error:", error);
                return null;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(
            React.createElement(
                ErrorBoundary,
                null,
                React.createElement(App, null)
            )
        );
    </script>
